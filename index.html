<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소통하자! AAC 대화상대자 훈련 — 통합 워크시트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:#f0f4ff;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}
:root{--primary:#3b5bdb;--pl:#e8edff;--border:#e2e8f0;--border2:#cbd5e1;--surface:#fff;--surface2:#f8f9fc;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--green:#10b981;--orange:#f59e0b;--red:#ef4444;}
.hdr{background:linear-gradient(135deg,#1e3a8a,#3b5bdb,#6366f1);color:#fff;display:flex;align-items:center;gap:10px;padding:0 16px;height:48px;flex-shrink:0;}
.hdr-logo{font-size:13px;font-weight:700;}
.hdr-sp{flex:1;}
.hdr-inp{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:5px;padding:3px 8px;font-size:11px;width:90px;font-family:inherit;}
.hdr-inp::placeholder{color:rgba(255,255,255,.5);}
.body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:190px;min-width:190px;background:#fff;border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
.sb-sec{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:0 12px 5px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:.15s;}
.sb-item:hover{background:var(--pl);}
.sb-item.active{background:var(--pl);border-left-color:var(--primary);}
.sb-num{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-title{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-sub{font-size:9px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-div{height:1px;background:var(--border);margin:8px 12px;}
.main{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;}
.s-hdr{background:#fff;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);}
.s-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.s-title{font-size:15px;font-weight:700;}
.s-barrier{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;margin-top:3px;display:inline-block;}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:0;}
.card-hdr{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2);}
.card-title{font-size:13px;font-weight:700;}
.card-hint{font-size:10px;color:var(--text3);}
.card-body{padding:16px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fl{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=password],select,textarea{border:1px solid var(--border2);border-radius:7px;padding:6px 10px;font-size:12px;font-family:inherit;color:var(--text);background:#fff;width:100%;outline:none;}
input[type=text]:focus,input[type=password]:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(59,91,219,.1);}
textarea{resize:vertical;min-height:64px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:11px;}
.tbl{width:100%;border-collapse:collapse;font-size:11px;}
.tbl th{background:var(--surface2);padding:6px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);border-bottom:2px solid var(--border2);white-space:nowrap;}
.tbl td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl td input{border:none;background:transparent;width:100%;font-family:inherit;font-size:11px;padding:2px 0;border-bottom:1px dashed var(--border2);outline:none;color:var(--text);}
.tbl td input:focus{border-bottom-color:var(--primary);}
.info-box{border-radius:0 8px 8px 0;padding:8px 12px;font-size:11px;line-height:1.7;margin-bottom:11px;}
.add-btn{margin-top:7px;padding:4px 11px;border:1px dashed var(--border2);border-radius:7px;background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;}
.add-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--pl);}
.eval-wrap{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid var(--border);border-radius:10px;padding:14px;}
.eval-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:7px;border:1px solid var(--border);margin-bottom:6px;}
.eval-text{flex:1;font-size:11px;line-height:1.5;}
.eb{width:27px;height:27px;border-radius:5px;border:1.5px solid var(--border2);background:#fff;cursor:pointer;font-size:10px;font-weight:700;transition:.15s;font-family:inherit;}
.eb:hover{transform:scale(1.1);}
.eb.s1{border-color:#ef4444;color:#ef4444;}.eb.s1.sel{background:#ef4444;color:#fff;}
.eb.s2{border-color:#f97316;color:#f97316;}.eb.s2.sel{background:#f97316;color:#fff;}
.eb.s3{border-color:#f59e0b;color:#f59e0b;}.eb.s3.sel{background:#f59e0b;color:#fff;}
.eb.s4{border-color:#10b981;color:#10b981;}.eb.s4.sel{background:#10b981;color:#fff;}
.vtabs{display:flex;gap:3px;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:12px;}
.vt-btn{flex:1;padding:6px;border-radius:6px;border:none;background:transparent;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text2);}
.vt-btn.active{background:#fff;color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:#fff;border:1px solid var(--border2);border-radius:20px;font-size:10px;margin:2px;}
.chip-x{border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0;}
.toast{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;padding:9px 16px;border-radius:8px;font-size:11px;opacity:0;transform:translateY(8px);transition:.3s;pointer-events:none;z-index:998;}
.toast.show{opacity:1;transform:translateY(0);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--text3);gap:8px;}
label.ck{display:inline-flex;align-items:center;gap:3px;cursor:pointer;font-size:11px;}
.tag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;}
</style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div id="login-overlay" style="position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a,#3b5bdb,#6366f1);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border-radius:16px;padding:40px 44px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center;">
    <div style="font-size:36px;margin-bottom:12px">🗣️</div>
    <div style="font-size:20px;font-weight:700;color:#1e3a8a;margin-bottom:4px">소통하자!</div>
    <div style="font-size:13px;color:#475569;margin-bottom:6px">AAC 대화상대자 훈련 프로그램</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:28px;padding:8px 12px;background:#f0f4ff;border-radius:8px">연수 참여자 전용 통합 워크시트</div>
    <div style="text-align:left;margin-bottom:6px">
      <label style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.5px">비밀번호</label>
    </div>
    <input type="password" id="pw-input" placeholder="비밀번호를 입력하세요"
      style="width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;color:#1e293b;"
      onkeydown="if(event.key==='Enter')tryLogin()">
    <div id="pw-error" style="font-size:11px;color:#ef4444;min-height:16px;margin-bottom:8px;text-align:left"></div>
    <button onclick="tryLogin()"
      style="width:100%;padding:12px;background:linear-gradient(135deg,#3b5bdb,#6366f1);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">
      입장하기
    </button>
    <div style="margin-top:20px;font-size:10px;color:#cbd5e1">비밀번호는 연수 담당자에게 문의하세요</div>
  </div>
</div>

<header class="hdr">
  <span class="hdr-logo">소통하자! AAC 대화상대자 훈련 — 통합 워크시트</span>
  <div class="hdr-sp"></div>
  <span style="font-size:10px;opacity:.7">학생명</span>
  <input class="hdr-inp" id="studentName" placeholder="이름">
  <span style="font-size:10px;opacity:.7">교사명</span>
  <input class="hdr-inp" id="teacherName" placeholder="이름">
</header>
<div class="body">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="empty"><div style="font-size:40px">📋</div><div>왼쪽에서 회기를 선택하세요</div></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
// ── 로그인 ──
function tryLogin(){
  const pw=document.getElementById('pw-input').value;
  const err=document.getElementById('pw-error');
  if(pw==='251SEG02'){
    document.getElementById('login-overlay').style.display='none';
    try{localStorage.setItem('aac_auth','251SEG02');}catch(e){}
  } else {
    err.textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
    setTimeout(()=>{err.textContent='';},2500);
  }
}
try{
  if(localStorage.getItem('aac_auth')==='251SEG02'){
    document.getElementById('login-overlay').style.display='none';
  }
}catch(e){}

// ── 데이터 ──
const SESS=[
  {n:1,c:"#6366f1",t:"의사소통 사전",s:"의사소통 권리와 대화상대자 개념",b:"태도 장벽",bc:"#ede9fe",bt:"#6d28d9"},
  {n:2,c:"#0ea5e9",t:"CPP 자기성찰",s:"지체중복장애 의사소통 특성 이해",b:"지식 장벽",bc:"#e0f2fe",bt:"#0369a1"},
  {n:3,c:"#10b981",t:"PAA 상징수준",s:"AAC 도구 및 보조공학 소개·실습",b:"지식 장벽",bc:"#d1fae5",bt:"#047857"},
  {n:4,c:"#f59e0b",t:"AAC 선택 체크",s:"AAC 평가 및 어휘선정",b:"지식 장벽",bc:"#fef3c7",bt:"#b45309"},
  {n:5,c:"#3b5bdb",t:"어휘목록 작성",s:"어휘목록 만들기",b:"지식 장벽",bc:"#e8edff",bt:"#2f4ac0"},
  {n:6,c:"#ec4899",t:"의사소통판 설계",s:"상징 수준별 의사소통 자료 제작",b:"실행 장벽",bc:"#fce7f3",bt:"#be185d"},
  {n:7,c:"#ef4444",t:"소통하자! 스크립트",s:"소통하자! 대화상대자 전략",b:"실행 장벽",bc:"#fee2e2",bt:"#b91c1c"},
  {n:8,c:"#84cc16",t:"또래 대화상대자",s:"소통하자! AAC 모델링",b:"실제 장벽",bc:"#ecfccb",bt:"#4d7c0f"},
  {n:9,c:"#f97316",t:"AAC 모델링 기록",s:"의사소통 수업 계획 수립",b:"실제 장벽",bc:"#ffedd5",bt:"#c2410c"},
];
const EVAL={
  1:["의사소통 권리의 개념과 AAC 대화상대자의 역할을 설명할 수 있다","의사소통 사전 작성 방법을 알고 적용할 수 있다","학생의 행동 관찰을 통해 의사소통 의미를 파악하고 기록할 수 있다","교사의 반응 방법을 팀원 간 합의하여 공유할 수 있다"],
  2:["지체중복장애 학생의 의사소통 특성을 설명할 수 있다","CPP 체크리스트 각 항목을 이해하고 자기성찰에 활용할 수 있다","AAC 사용자의 자율성 존중 원칙을 안다","나의 현재 대화상대자 역량 수준을 객관적으로 점검할 수 있다"],
  3:["PAA의 목적과 구성을 설명할 수 있다","PAA 문항 2 결과로 학생의 상징 수준을 결정할 수 있다","상징 수준별 적합한 AAC 자료를 안다","결과를 6회기 의사소통판 제작에 연계할 수 있다"],
  4:["AAC 유형별 특성과 적합 대상을 설명할 수 있다","보조공학 기기의 필요 여부를 판단할 수 있다","PAA 결과와 비교하여 최종 AAC를 선택할 수 있다","선택한 AAC를 6회기 의사소통판 제작에 연계할 수 있다"],
  5:["생태학적 목록으로 일상 환경을 분석하여 어휘를 수집할 수 있다","핵심어휘(core)와 주변어휘(fringe)를 구분하고 선정할 수 있다","JIT 어휘 수집 방법을 활용할 수 있다","완성된 어휘목록을 6회기 의사소통판 제작에 연계할 수 있다"],
  6:["PAA 결과와 어휘목록으로 의사소통판의 상징·칸 수를 결정할 수 있다","단면판·다면판·의사소통책·AAC 앱 중 적합한 유형을 선택할 수 있다","접근 방법에 맞는 판을 설계할 수 있다","어휘 배치 그리드를 계획하고 실제로 의사소통판을 제작할 수 있다"],
  7:["소통하자! 전략 5단계를 설명하고 실습에 적용할 수 있다","학생 발달단계에 맞는 스크립트를 구성할 수 있다","의도적으로 기회를 제공하고 충분히 기다리는 전략을 실습할 수 있다","스크립트 변형으로 자발적 의사소통을 유도하는 방법을 안다"],
  8:["또래 대화상대자 훈련의 핵심 원칙을 안다","또래 대화상대자 10단계를 학생 특성에 맞게 재구성할 수 있다","수업 중 또래 대화상대자를 활용할 수 있는 장면을 계획할 수 있다","비상징적 의사소통 단계 학생과 또래의 상호작용 방법을 안다"],
  9:["ALM이 모든 단계에 공통 적용됨을 이해한다","학생의 의사소통 단계별 권장 모델링 전략을 안다","실습 상황에서 단계별 AAC 모델링을 계획하고 실행할 수 있다","VSD의 개념과 단계별 적용 방법을 안다"],
};

let appData={};
let vocabs=[], ecoData={home:[],school:[],community:[]}, subjectData=[], jitItems=[];
let cur=null;

// localStorage 저장/불러오기
function saveLS(){
  try{
    localStorage.setItem('aac_ws_data', JSON.stringify({
      appData, vocabs, ecoData, subjectData, jitItems,
      student: document.getElementById('studentName').value,
      teacher: document.getElementById('teacherName').value,
    }));
  }catch(e){}
}
function loadLS(){
  try{
    const d=JSON.parse(localStorage.getItem('aac_ws_data')||'{}');
    if(d.appData)appData=d.appData;
    if(d.vocabs)vocabs=d.vocabs;
    if(d.ecoData)ecoData=d.ecoData;
    if(d.subjectData)subjectData=d.subjectData;
    if(d.jitItems)jitItems=d.jitItems;
    if(d.student)document.getElementById('studentName').value=d.student;
    if(d.teacher)document.getElementById('teacherName').value=d.teacher;
  }catch(e){}
}
window.addEventListener('load', loadLS);
document.addEventListener('input', ()=>setTimeout(saveLS,500));

// 사이드바
function renderSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML=`
    <div class="sb-sec">회기별 워크시트</div>
    ${SESS.map(s=>`<div class="sb-item" id="nav-${s.n}" onclick="go(${s.n})">
      <div class="sb-num" style="background:${s.c}">${s.n}</div>
      <div><div class="sb-title">${s.t}</div><div class="sb-sub">${s.s.slice(0,14)}...</div></div>
    </div>`).join('')}
    <div class="sb-div"></div>
    <div class="sb-sec">어휘목록</div>
    <div class="sb-item" id="nav-v" onclick="goV()">
      <div class="sb-num" style="background:#6366f1">📝</div>
      <div><div class="sb-title">어휘목록 작성기</div><div class="sb-sub">생태학적·교과·JIT</div></div>
    </div>`;
}
renderSidebar();

function setActive(id){
  document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('nav-'+id);
  if(el)el.classList.add('active');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function getSD(n){if(!appData[n])appData[n]={};return appData[n];}

// 자기평가
function evalHTML(n){
  const items=EVAL[n]||[];
  const sd=getSD(n);
  return `<div class="eval-wrap">
    <div style="font-weight:700;font-size:13px;color:#1e40af;margin-bottom:12px">🎯 이해도 자기평가 <span style="font-size:10px;font-weight:400;color:var(--text2)">1=전혀 모름 · 2=조금 앎 · 3=대체로 앎 · 4=잘 앎</span></div>
    ${items.map((item,i)=>`<div class="eval-row">
      <div class="eval-text">${item}</div>
      <div style="display:flex;gap:3px;flex-shrink:0">
        ${[1,2,3,4].map(v=>`<button class="eb s${v} ${(sd.ev&&sd.ev[i]===v)?'sel':''}" onclick="setEval(${n},${i},${v},this)">${v}</button>`).join('')}
      </div></div>`).join('')}
    <textarea style="width:100%;margin-top:10px;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;font-size:11px;font-family:inherit;min-height:52px;resize:vertical" 
      placeholder="새롭게 알게 된 점, 어려웠던 점, 실천 다짐을 자유롭게 적어보세요."
      oninput="getSD(${n}).evalMemo=this.value;saveLS()">${sd.evalMemo||''}</textarea>
  </div>`;}

function setEval(n,i,v,btn){
  btn.closest('.eval-row').querySelectorAll('.eb').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  const sd=getSD(n);if(!sd.ev)sd.ev={};sd.ev[i]=v;saveLS();
}

// ── 세션 표시 ──
function go(n){
  setActive(n); cur=n;
  const s=SESS[n-1];
  let ws='';
  if(n===1)ws=ws1();
  else if(n===2)ws=ws2();
  else if(n===3)ws=ws3();
  else if(n===4)ws=ws4();
  else if(n===5)ws=ws5();
  else if(n===6)ws=ws6();
  else if(n===7)ws=ws7();
  else if(n===8)ws=ws8();
  else if(n===9)ws=ws9();
  document.getElementById('main').innerHTML=`
    <div class="s-hdr">
      <div class="s-badge" style="background:${s.c}">${s.n}</div>
      <div><div class="s-title">${s.s}</div><span class="s-barrier" style="background:${s.bc};color:${s.bt}">${s.b}</span></div>
    </div>
    ${ws}
    ${evalHTML(n)}`;
  if(n===1)initS1();
}

// ── 1회기 ──
function ws1(){
  return `<div class="card">

      <div class="fg"><div class="fl">학년/학급</div><input type="text" id="s1-grade" oninput="getSD(1).grade=this.value;saveLS()"></div>
      <div class="fg"><div class="fl">작성일</div><input type="text" id="s1-date" oninput="getSD(1).date=this.value;saveLS()"></div>
      <div class="fg"><div class="fl">작성자</div><input type="text" id="s1-writer" placeholder="담임교사, 부모 등" oninput="getSD(1).writer=this.value;saveLS()"></div>
      <div class="fg"><div class="fl">관찰 기간</div><input type="text" id="s1-period" placeholder="예) 2025.3.1 ~ 3.7" oninput="getSD(1).period=this.value;saveLS()"></div>
      <div class="fg"><div class="fl">확인자</div><input type="text" id="s1-confirmer" oninput="getSD(1).confirmer=this.value;saveLS()"></div>
    </div>
    <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr>
          <th style="width:60px">사진</th>
          <th style="min-width:100px">행동 관찰</th>
          <th style="min-width:90px">상황/맥락</th>
          <th style="min-width:110px">의미 (1인칭)</th>
          <th style="min-width:120px">교사 반응</th>
          <th style="min-width:80px">연계 AAC 어휘</th>
          <th style="width:60px">비고</th>

    <div style="margin-top:6px;font-size:10px;color:var(--text3)">참고: Beukelman, D. R., & Mirenda, P. (2013). Augmentative and alternative communication (4th ed.). Paul H. Brookes.</div>

function initS1(){
  const sd=getSD(1);
  ['name','grade','date','writer','period','confirmer'].forEach(k=>{
    const el=document.getElementById('s1-'+k);
    if(el&&sd[k])el.value=sd[k];
  });
  if(sd.team){const el=document.getElementById('s1-team');if(el)el.value=sd.team;}
  const rows=sd.rows||[
    {a:'📷',b:'손을 뻗는다',c:'간식 시간, 물건 근처',d:'"더 주세요."',e:"'더' 즉시 제공 + AAC 모델링",f:'더',g:'예시'},
    {a:'📷',b:'몸을 뒤로 젖힌다',c:'과제 중, 낯선 상황',d:'"싫어요./그만할래요."',e:'활동 중단 + 선택권 제공',f:'싫어, 그만',g:'예시'},
    {a:'📷',b:'교사를 계속 쳐다본다',c:'어려운 과제 중',d:'"도와주세요."',e:'즉각 도움 + AAC 도와줘 모델링',f:'도와줘',g:'예시'},
    {a:'📷',b:'',c:'',d:'',e:'',f:'',g:''},
    {a:'📷',b:'',c:'',d:'',e:'',f:'',g:''},
    {a:'📷',b:'',c:'',d:'',e:'',f:'',g:''},
  ];
  renderDictRows(rows);
}
function renderDictRows(rows){
  const tbody=document.getElementById('s1-tbody');if(!tbody)return;
  tbody.innerHTML=rows.map((r,i)=>`<tr>
    <td><input type="text" value="${(r.a||'📷').replace(/"/g,'&quot;')}" oninput="saveRow(${i},'a',this.value)"></td>
    <td><input type="text" value="${(r.b||'').replace(/"/g,'&quot;')}" oninput="saveRow(${i},'b',this.value)" placeholder="행동 내용"></td>
    <td><input type="text" value="${(r.c||'').replace(/"/g,'&quot;')}" oninput="saveRow(${i},'c',this.value)" placeholder="상황/맥락"></td>
    <td><input type="text" value="${(r.d||'').replace(/"/g,'&quot;')}" oninput="saveRow(${i},'d',this.value)" placeholder='"..." 형식으로'></td>
    <td><input type="text" value="${(r.e||'').replace(/"/g,'&quot;')}" oninput="saveRow(${i},'e',this.value)" placeholder="교사 반응"></td>
    <td><input type="text" value="${(r.f||'').replace(/"/g,'&quot;')}" oninput="saveRow(${i},'f',this.value)" placeholder="핵심 어휘"></td>
    <td><input type="text" value="${(r.g||'').replace(/"/g,'&quot;')}" oninput="saveRow(${i},'g',this.value)" placeholder="메모"></td>
  </tr>`).join('');
}
function saveRow(i,k,v){
  const sd=getSD(1);
  if(!sd.rows)sd.rows=Array(6).fill(null).map(()=>({a:'📷',b:'',c:'',d:'',e:'',f:'',g:''}));
  if(!sd.rows[i])sd.rows[i]={a:'📷'};
  sd.rows[i][k]=v;
  saveLS();
}
function addDictRow(){
  const sd=getSD(1);
  if(!sd.rows)sd.rows=Array(6).fill(null).map(()=>({a:'📷',b:'',c:'',d:'',e:'',f:'',g:''}));
  sd.rows.push({a:'📷',b:'',c:'',d:'',e:'',f:'',g:''});
  renderDictRows(sd.rows);
  saveLS();
}

// ── 2회기 ──
function ws2(){
  const items=["상대방이 어떻게 반응하든 AAC 사용자에게 자연스럽게 직접 말을 건넨다","AAC 사용자의 자율성을 존중하며, 도움을 주기 전에 먼저 허락을 구한다","원하는 기기나 방식이 아니더라도(몸짓, 소리 등) 학생의 모든 의사소통 시도에 반응한다","'반응 없음'이나 거부 표현도 AAC 사용자가 자신을 나타내는 방식 중 하나임을 인정한다","학생이 말을 끝냈다는 신호를 줄 때까지 끊지 않고 충분히 기다렸다가 반응한다","AAC 사용자를 개인적으로 잘 알기 위해 시간을 투자하고 상호작용 방식을 조율한다","식사 메뉴, 활동 선택 등 일상적인 결정에 AAC 사용자가 의미 있게 참여할 수 있도록 한다","기기 배치, 학습 주제 선정 등 장기적인 결정에도 AAC 사용자가 참여할 수 있도록 한다","어휘 배치를 익혀서 AAC 사용자에게 다양한 선택지를 고르는 방법을 실제로 보여줄 수 있다","학생이 이미 사용할 수 있는 수준을 넘어서는 단어나 표현을 직접 시범 보이거나 모델링한다","자연스러운 상황에서 의사소통 기회를 찾아 이끌어낸다"];
  const sd=getSD(2);
  return `<div class="card">
  <div class="card-hdr"><div class="card-title">✅ CPP 대화상대자 자기성찰 체크리스트</div><div class="card-hint">OpenAAC CPP v1 | 1=전혀 안 함 · 2=가끔 · 3=대체로 · 4=항상</div></div>
  <div class="card-body">
    ${items.map((item,i)=>`<div class="eval-row">
      <div class="eval-text">${item}</div>
      <div style="display:flex;gap:3px;flex-shrink:0">
        ${[1,2,3,4].map(v=>`<button class="eb s${v} ${(sd.cpp&&sd.cpp[i]===v)?'sel':''}" onclick="setCPP(${i},${v},this)">${v}</button>`).join('')}
      </div></div>`).join('')}
    <textarea style="width:100%;margin-top:10px;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;font-size:11px;font-family:inherit;min-height:52px;resize:vertical"
      placeholder="나의 강점과 보완이 필요한 부분을 적어보세요."
      oninput="getSD(2).memo=this.value;saveLS()">${sd.memo||''}</textarea>
    <div style="margin-top:6px;font-size:10px;color:var(--text3)">출처: Communication Partner Profile (CPP v1). OpenAAC.</div>
  </div></div>`;}
function setCPP(i,v,btn){
  btn.closest('.eval-row').querySelectorAll('.eb').forEach(b=>b.classList.remove('sel'));

  const sd=getSD(2);if(!sd.cpp)sd.cpp={};sd.cpp[i]=v;saveLS();
}

• 사회적 상호작용 지원
• 참여 증가
• 의사소통 순서 증가",tech:"사진·그림상징판 + VSD
(선호하는 책·활동 기반)",rec:"★ 시간 지연
기대하는 눈빛으로
5초 침묵
(지도서, 2022)"},
    {stage:"의도적 비구어",desc:"의도적이지만 상징 없음",goals:"• 전위 발화를 위한 맥락 지원
• 의사소통 순서 증가
• 사회적 상호작용 및 정보 교환 지원",tech:"그림상징판 + 커뮤니샷
(학생 경험 담은 VSD)",rec:"★ 요구-모델
먼저 요구→기다리기
→AAC 시범→촉진
(Warren & Rogers-Warren, 1980)"},
    {stage:"의도적 상징적",desc:"상징 사용 가능",goals:"• 단어 읽기 기술 학습 지원
• 문해 학습 도입
• 독립적 과제 수행 기술
• 의사소통 요구 충족",tech:"커뮤니샷 앱 (격자형 AAC)
T2L 포함",rec:"★ 요구-모델 + 확장 모델링
학생 발화보다 한 단계
높은 수준으로 확장
(Binger & Light, 2007)"},
  ];
  return `<div class="card">
  <div class="card-hdr"><div class="card-title">🎙️ AAC 모델링 계획 및 실습 기록지</div><div class="card-hint">Light et al.(2018) 재구성 | ALM 전 단계 공통 적용</div></div>
  <div class="card-body">
    <div class="grid3">
      <div class="fg"><div class="fl">교사 이름</div><input type="text" value="${sd.name||''}" oninput="getSD(9).name=this.value;saveLS()"></div>
      <div class="fg"><div class="fl">대상 학생</div><input type="text" value="${sd.student||''}" oninput="getSD(9).student=this.value;saveLS()"></div>
      <div class="fg"><div class="fl">PAA 발달단계</div>
        <select oninput="getSD(9).stage=this.value;saveLS()">
          <option value="">선택...</option>
          ${["출현적","맥락의존적","독립적/전의도적","의도적 비구어","의도적 상징적"].map(o=>`<option ${sd.stage===o?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="info-box" style="background:#dbeafe;border-left:3px solid #3b82f6">
      ✅ <strong>ALM (보조 언어 자극)</strong> — 모든 단계 공통 기본 적용: 말하면서 동시에 AAC 상징 짚기
    </div>
    ${rows.map((row,ri)=>`<div style="border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap">
        <label class="ck"><input type="radio" name="s9s" ${sd.selectedStage===ri?'checked':''} onchange="getSD(9).selectedStage=${ri};saveLS()" style="accent-color:#f97316;width:14px;height:14px"><strong style="font-size:12px">선택 (우리 학생 단계)</strong></label>
        <span style="padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;background:#ffedd5;color:#c2410c">${row.stage}</span>
        <span style="font-size:10px;color:var(--text3)">${row.desc}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:9px">
        <div style="background:var(--surface2);border-radius:8px;padding:8px">
          <div style="font-size:9px;font-weight:700;color:var(--text2);margin-bottom:3px">AAC 중재 목표</div>
          <div style="font-size:10px;white-space:pre-line">${row.goals}</div>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:8px">
          <div style="font-size:9px;font-weight:700;color:var(--text2);margin-bottom:3px">AAC 기술 지원</div>
          <div style="font-size:10px;white-space:pre-line">${row.tech}</div>
        </div>
        <div style="background:#fef3c7;border-radius:8px;padding:8px">
          <div style="font-size:9px;font-weight:700;color:#b45309;margin-bottom:3px">단계별 권장 전략</div>
          <div style="font-size:10px;white-space:pre-line">${row.rec}</div>
        </div>
      </div>
      <div class="fg" style="margin-bottom:7px"><div class="fl">▶ 모델링 계획</div>
        <textarea style="min-height:40px" placeholder="구체적 상황·어휘·방법..."
          oninput="if(!getSD(9).plans)getSD(9).plans={};getSD(9).plans[${ri}]=this.value;saveLS()">${(sd.plans&&sd.plans[ri])||''}</textarea>
      </div>
      <div style="display:flex;gap:10px;font-size:11px;align-items:center;flex-wrap:wrap">
        <strong style="color:var(--text2)">▶ 실습 후 체크:</strong>
        ${["잘 됨","보통","어려움"].map(l=>`<label class="ck"><input type="radio" name="s9c${ri}" style="accent-color:#10b981">${l}</label>`).join('')}
        <span style="font-weight:600;color:var(--text2)">어려웠던 점:</span>
        <input type="text" style="flex:1;min-width:100px">
      </div>
    </div>`).join('')}
    <div style="padding:12px 13px;background:#d1fae5;border-radius:8px;border:1px solid #6ee7b7">
      <div style="font-weight:700;font-size:12px;margin-bottom:7px;color:#047857">소통하자! 전략 기반 모델링 실습 종합 기록</div>
      <div style="font-size:11px;margin-bottom:5px">
        <strong>소통하자!:</strong>
        ${["①준비하기","②기회제공","③기다리기(  초)","④반응하기","⑤AAC모델링"].map(l=>`<label class="ck" style="margin-right:8px"><input type="checkbox" style="accent-color:#10b981">${l}</label>`).join('')}
      </div>
      <div class="grid3">
        <div class="fg"><div class="fl">실습 상황 및 장면</div><textarea style="min-height:52px" oninput="getSD(9).sit=this.value;saveLS()">${sd.sit||''}</textarea></div>
        <div class="fg"><div class="fl">잘 된 점</div><textarea style="min-height:52px" oninput="getSD(9).good=this.value;saveLS()">${sd.good||''}</textarea></div>
        <div class="fg"><div class="fl">어려운 점 및 보완 방향</div><textarea style="min-height:52px" oninput="getSD(9).hard=this.value;saveLS()">${sd.hard||''}</textarea></div>
      </div>
      <div class="fg" style="margin-top:7px"><div class="fl">실천과제 계획</div>
        <textarea style="min-height:40px" oninput="getSD(9).plan=this.value;saveLS()">${sd.plan||''}</textarea>
      </div>
    </div>
    <div style="margin-top:7px;font-size:10px;color:var(--text3)">※ Light et al.(2018) 재구성 / ALM: Goossens\'(1989); Binger & Light(2007) / PMT: Yoder & Warren(1998) / 요구-모델: Warren & Rogers-Warren(1980)</div>
  </div></div>`;}

// ── 어휘목록 ──
function goV(){
  setActive('v'); cur='vocab';
  document.getElementById('main').innerHTML=`
    <div class="s-hdr" style="background:linear-gradient(135deg,#4f46e5,#6366f1)">
      <div class="s-badge" style="background:rgba(255,255,255,.2);font-size:20px">📝</div>
      <div><div class="s-title" style="color:#fff">어휘목록 작성기</div><div style="color:rgba(255,255,255,.7);font-size:11px;margin-top:1px">생태학적 목록 · 교과별 어휘 · JIT 기록 · 종합 어휘목록</div></div>
    </div>
    <div class="card">
      <div class="card-body" style="padding:12px">
        <div class="vtabs">
          <button class="vt-btn active" id="vt-summary" onclick="switchV('summary',this)">📊 종합 어휘목록</button>
          <button class="vt-btn" id="vt-eco" onclick="switchV('eco',this)">🌿 생태학적 목록</button>
          <button class="vt-btn" id="vt-sub" onclick="switchV('sub',this)">📚 교과별 어휘</button>
          <button class="vt-btn" id="vt-jit" onclick="switchV('jit',this)">⚡ JIT 기록</button>
        </div>
        <div id="vtab-body"></div>
      </div>
    </div>`;
  renderVTab('summary');
}
function switchV(name,btn){
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderVTab(name);
}
function renderVTab(name){
  const c=document.getElementById('vtab-body');if(!c)return;
  if(name==='summary')c.innerHTML=renderVSum();
  else if(name==='eco')c.innerHTML=renderEco();
  else if(name==='sub')c.innerHTML=renderSub();
  else if(name==='jit')c.innerHTML=renderJIT();
}
function renderVSum(){
  if(!vocabs.length)return`<div class="empty"><div style="font-size:36px">📝</div><div>생태학적 목록, 교과별 어휘, JIT 탭에서 어휘를 추가하세요</div></div>`;
  const sc={"생태학":["#d1fae5","#047857"],"교과":["#dbeafe","#1d4ed8"],"JIT":["#fef3c7","#b45309"]};
  return`<div style="overflow-x:auto"><table class="tbl">
    <thead><tr><th>어휘</th><th>출처</th><th>맥락/상황</th><th>유형</th><th>중요도</th><th>의사소통기능</th><th></th></tr></thead>
    <tbody>${vocabs.map((v,i)=>{const[bg,tc]=(sc[v.source]||["#f3f4f6","#374151"]);return`<tr>
      <td><strong>${v.word}</strong></td>
      <td><span class="tag" style="background:${bg};color:${tc}">${v.source}</span></td>
      <td style="font-size:10px;color:var(--text2)">${v.context||''}</td>
      <td><select onchange="vocabs[${i}].type=this.value;saveLS()" style="padding:2px 4px;font-size:10px">
        <option ${v.type==='core'?'selected':''} value="core">핵심</option>
        <option ${v.type==='fringe'?'selected':''} value="fringe">주변</option>
      </select></td>
      <td><select onchange="vocabs[${i}].priority=this.value;saveLS()" style="padding:2px 4px;font-size:10px">
        <option ${v.priority==='3'?'selected':''} value="3">★★★</option>
        <option ${v.priority==='2'?'selected':''} value="2">★★☆</option>
        <option ${v.priority==='1'?'selected':''} value="1">★☆☆</option>
      </select></td>
      <td><input type="text" value="${v.func||''}" onchange="vocabs[${i}].func=this.value;saveLS()" style="width:70px;border:none;border-bottom:1px dashed var(--border2);background:transparent;outline:none;font-size:10px;color:var(--text)"></td>
      <td><button onclick="vocabs.splice(${i},1);renderVTab('summary');saveLS()" style="border:none;background:none;color:var(--text3);cursor:pointer">✕</button></td>
    </tr>`}).join('')}</tbody></table></div>`;}
function renderEco(){
  const envs=[['home','🏠 가정','#fef3c7'],['school','🏫 학교','#dbeafe'],['community','🌍 지역사회','#d1fae5']];
  return envs.map(([env,lbl,bg])=>`<div style="border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden">
    <div style="padding:8px 13px;background:${bg};font-weight:700;font-size:12px">${lbl}</div>
    <div style="padding:10px 13px">
      <div style="display:flex;gap:6px;margin-bottom:7px">
        <input type="text" id="eco-${env}-a" placeholder="활동 이름" style="flex:1">
        <input type="text" id="eco-${env}-w" placeholder="어휘" style="flex:1">
        <input type="text" id="eco-${env}-c" placeholder="맥락/상황" style="flex:1">
        <button onclick="addEco('${env}')" style="padding:5px 11px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap">추가 →</button>
      </div>
      ${(ecoData[env]||[]).length?`<div style="display:flex;flex-wrap:wrap">${(ecoData[env]||[]).map((item,i)=>`<span class="chip">${item.word}<span style="color:var(--text3);font-size:9px"> ${item.activity}</span><button class="chip-x" onclick="ecoData['${env}'].splice(${i},1);renderVTab('eco');saveLS()">✕</button></span>`).join('')}</div>`:`<span style="color:var(--text3);font-size:11px">아직 추가된 어휘가 없어요</span>`}
    </div></div>`).join('');}
function addEco(env){
  const a=document.getElementById('eco-'+env+'-a').value.trim();
  const w=document.getElementById('eco-'+env+'-w').value.trim();
  const c=document.getElementById('eco-'+env+'-c').value.trim();
  if(!w){showToast('어휘를 입력하세요');return;}
  if(!ecoData[env])ecoData[env]=[];
  ecoData[env].push({activity:a,word:w,context:c});
  vocabs.push({word:w,source:'생태학',context:c||a,type:'core',priority:'2',func:''});
  renderVTab('eco');saveLS();showToast('어휘 추가됐어요 ✓');
}
function renderSub(){
  return`<div>
    <div style="display:flex;gap:7px;margin-bottom:11px">
      <input type="text" id="new-sub" placeholder="교과 이름 (예: 국어, 사회생활)" style="flex:1">
      <button onclick="addSub()" style="padding:5px 13px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600">교과 추가</button>
    </div>
    ${subjectData.length===0?`<div class="empty" style="min-height:100px"><div style="font-size:28px">📚</div><div>교과를 추가하고 어휘를 입력하세요</div></div>`:''}
    ${subjectData.map((sub,si)=>`<div style="border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden">
      <div style="padding:8px 13px;background:#ede9fe;font-weight:700;font-size:12px;display:flex;justify-content:space-between;align-items:center">
        📚 ${sub.name}
        <button onclick="subjectData.splice(${si},1);renderVTab('sub');saveLS()" style="border:none;background:none;cursor:pointer;font-size:11px;color:var(--text3)">삭제</button>
      </div>
      <div style="padding:10px 13px">
        <div style="display:flex;gap:6px;margin-bottom:7px">
          <input type="text" id="sub-${si}-a" placeholder="활동명" style="flex:1">
          <input type="text" id="sub-${si}-w" placeholder="어휘" style="flex:1">
          <select id="sub-${si}-f" style="flex:1"><option>요구하기</option><option>거부하기</option><option>선택하기</option><option>감정표현</option><option>질문하기</option><option>정보전달</option></select>
          <button onclick="addSubV(${si})" style="padding:5px 11px;background:#8b5cf6;color:#fff;border:none;border-radius:7px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600">추가 →</button>
        </div>
        ${(sub.items||[]).length?`<div style="display:flex;flex-wrap:wrap">${(sub.items||[]).map((item,ii)=>`<span class="chip">${item.word}<span style="color:var(--text3);font-size:9px"> ${item.func}</span><button class="chip-x" onclick="subjectData[${si}].items.splice(${ii},1);renderVTab('sub');saveLS()">✕</button></span>`).join('')}</div>`:`<span style="color:var(--text3);font-size:11px">아직 추가된 어휘가 없어요</span>`}
      </div></div>`).join('')}
  </div>`;}
function addSub(){
  const n=document.getElementById('new-sub').value.trim();
  if(!n){showToast('교과 이름을 입력하세요');return;}
  subjectData.push({name:n,items:[]});saveLS();renderVTab('sub');
}
function addSubV(si){
  const a=document.getElementById('sub-'+si+'-a').value.trim();
  const w=document.getElementById('sub-'+si+'-w').value.trim();
  const f=document.getElementById('sub-'+si+'-f').value;
  if(!w){showToast('어휘를 입력하세요');return;}
  subjectData[si].items=subjectData[si].items||[];
  subjectData[si].items.push({activity:a,word:w,func:f});
  vocabs.push({word:w,source:'교과',context:subjectData[si].name+(a?'-'+a:''),type:'fringe',priority:'2',func:f});
  saveLS();renderVTab('sub');showToast('어휘 추가됐어요 ✓');
}
function renderJIT(){
  return`<div>
    <div class="info-box" style="background:#fef3c7;border-left:3px solid #f59e0b">⚡ <strong>JIT(Just-In-Time)</strong>: 교수 가능한 순간이 생기면 즉시 기록하세요!</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;margin-bottom:11px">
      <input type="text" id="jit-c" placeholder="상황 (급식, 놀이 등)">
      <input type="text" id="jit-w" placeholder="어휘">
      <input type="text" id="jit-e" placeholder="일화 기억">
      <button onclick="addJIT()" style="padding:5px 11px;background:#f59e0b;color:#fff;border:none;border-radius:7px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600">기록!</button>
    </div>
    ${jitItems.length?jitItems.map((item,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 11px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
      <span style="font-size:9px;color:var(--text3);flex-shrink:0">${item.date}</span>
      <strong style="font-size:11px">${item.word}</strong>
      <span style="color:var(--text2);font-size:10px;flex:1">${item.context} — ${item.episode}</span>
      <button onclick="vocabs.push({word:jitItems[${i}].word,source:'JIT',context:jitItems[${i}].context,type:'core',priority:'3',func:''});saveLS();showToast('어휘목록에 추가됐어요 ✓')" style="padding:2px 8px;background:var(--pl);color:var(--primary);border:1px solid var(--primary);border-radius:5px;font-size:9px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap">어휘 추가</button>
      <button onclick="jitItems.splice(${i},1);renderVTab('jit');saveLS()" style="border:none;background:none;color:var(--text3);cursor:pointer">✕</button>
    </div>`).join(''):`<div class="empty" style="min-height:80px"><div>아직 JIT 기록이 없어요</div></div>`}
  </div>`;}
function addJIT(){
  const c=document.getElementById('jit-c').value.trim();
  const w=document.getElementById('jit-w').value.trim();
  const e=document.getElementById('jit-e').value.trim();
  if(!w){showToast('어휘를 입력하세요');return;}
  const date=new Date().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'});
  jitItems.unshift({date,context:c,word:w,episode:e});
  saveLS();renderVTab('jit');showToast('JIT 기록 완료 ✓');
}
</script>
</body>

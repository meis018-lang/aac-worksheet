<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAC 대화상대자 훈련 프로그램</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--p:#1B4F8A;--pl:#E8F0FA;--pm:#4A7FC1;--g:#2A7A4B;--gl:#E6F4EC;--pu:#6B3FA0;--pul:#F0EAFA;--o:#D4691E;--ol:#FEF3E9;--r:#C0392B;--bg:#F2F5F9;--card:#FFF;--tx:#1A1A2E;--tm:#6B7280;--bd:#D8E2EF}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#0f2a52,#1B4F8A 55%,#2A7A4B)}
.lb{background:rgba(255,255,255,.97);border-radius:20px;padding:52px 44px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lb h2{font-size:1.3rem;font-weight:900;color:var(--p);margin-bottom:4px}
.lb p{font-size:.82rem;color:var(--tm);margin-bottom:28px;line-height:1.6}
.lb input[type=password]{width:100%;padding:13px 16px;border:2px solid var(--bd);border-radius:10px;font-size:1rem;font-family:inherit;margin-bottom:12px;outline:none}
.lb input[type=password]:focus{border-color:var(--p)}
.lbtn{width:100%;padding:13px;background:var(--p);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer}
.lerr{color:var(--r);font-size:.82rem;margin-top:8px;display:none}
#app{display:none}
.layout{display:flex;min-height:100vh}
.sb{width:236px;background:linear-gradient(180deg,#0f2a52,#1B4F8A);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sbh{padding:22px 16px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
.sbh h1{font-size:.92rem;font-weight:900;line-height:1.45}
.sbh p{font-size:.7rem;opacity:.55;margin-top:3px}
.sbs{padding:12px 8px 6px}
.sbt{font-size:.6rem;font-weight:700;letter-spacing:1px;opacity:.45;text-transform:uppercase;padding:0 8px;margin-bottom:4px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.79rem;font-weight:500;transition:all .15s;color:rgba(255,255,255,.7);margin-bottom:2px}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:rgba(255,255,255,.18);color:#fff;font-weight:700}
.ni .n{width:21px;height:21px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:900;flex-shrink:0}
.ni.on .n{background:rgba(255,255,255,.28)}
.sbf{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.lob{width:100%;padding:7px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.16);border-radius:7px;font-size:.75rem;font-family:inherit;cursor:pointer}
.mn{flex:1;padding:26px 30px;overflow-y:auto}
.pg{display:none}.pg.on{display:block}
.ph{margin-bottom:22px}
.ph h2{font-size:1.35rem;font-weight:900;color:var(--p)}
.ph p{font-size:.83rem;color:var(--tm);margin-top:4px;line-height:1.5}
.sb2{display:inline-block;background:var(--p);color:#fff;font-size:.69rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:7px}
.cd{background:var(--card);border-radius:12px;padding:20px 24px;box-shadow:0 2px 14px rgba(27,79,138,.09);border:1px solid var(--bd);margin-bottom:16px}
.ct{font-size:.93rem;font-weight:700;color:var(--p);margin-bottom:13px;padding-bottom:9px;border-bottom:2px solid var(--pl)}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:11px;margin-bottom:11px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.73rem;font-weight:700;color:var(--p)}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1.5px solid var(--bd);border-radius:7px;font-size:.83rem;font-family:inherit;outline:none;background:#FAFCFF}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p)}
.fg textarea{resize:vertical;min-height:72px;line-height:1.55}
.cg{display:flex;flex-wrap:wrap;gap:7px;margin-top:3px}
.cg label{display:flex;align-items:center;gap:4px;font-size:.8rem;cursor:pointer;padding:4px 10px;border:1.5px solid var(--bd);border-radius:20px;background:#fff;transition:all .13s}
.cg label:has(input:checked){background:var(--pl);border-color:var(--p);color:var(--p);font-weight:600}
.cg input{display:none}
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:.81rem}
th{background:var(--p);color:#fff;padding:8px 9px;text-align:center;font-weight:700;font-size:.77rem;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F8FBFF}
td input[type=text],td select,td textarea{width:100%;border:1px solid #E0E8F5;border-radius:5px;padding:4px 6px;font-size:.79rem;font-family:inherit;outline:none;background:transparent}
td input[type=text]:focus,td select:focus{border-color:var(--p);background:#fff}
td input[type=checkbox],td input[type=radio]{width:auto;cursor:pointer}
.btn{padding:7px 14px;border-radius:7px;font-size:.8rem;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all .13s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pm)}
.bg2{background:var(--g);color:#fff}.bg2:hover{background:#3a9960}
.bo{background:transparent;color:var(--p);border:1.5px solid var(--p)}.bo:hover{background:var(--pl)}
.br{background:#fee;color:var(--r);border:1px solid #fcc}.br:hover{background:var(--r);color:#fff}
.bs{padding:4px 9px;font-size:.72rem}
.bg3{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.ib{background:var(--ol);border-left:4px solid var(--o);border-radius:8px;padding:10px 14px;font-size:.81rem;line-height:1.6;margin-bottom:13px}
.ib strong{color:var(--o)}
.gb{background:var(--gl);border-left:4px solid var(--g);border-radius:8px;padding:10px 14px;font-size:.81rem;line-height:1.6;margin-bottom:11px}
.pb{background:var(--pul);border-left:4px solid var(--pu);border-radius:8px;padding:10px 14px;font-size:.81rem;line-height:1.6;margin-bottom:11px}
.tbar{display:flex;gap:4px;background:#E0E8F5;border-radius:10px;padding:4px;margin-bottom:18px;flex-wrap:wrap}
.tbtn{flex:1;min-width:100px;padding:8px 10px;border-radius:7px;border:none;background:transparent;font-size:.79rem;font-weight:600;font-family:inherit;cursor:pointer;color:var(--tm);transition:all .13s}
.tbtn.on{background:var(--card);color:var(--p);box-shadow:0 2px 7px rgba(0,0,0,.09)}
.tc{display:none}.tc.on{display:block}
.vc{background:var(--pl);color:var(--p);padding:2px 7px;border-radius:10px;font-size:.7rem;font-weight:700}
.vf{background:var(--gl);color:var(--g);padding:2px 7px;border-radius:10px;font-size:.7rem;font-weight:700}
.tc2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.tc2{grid-template-columns:1fr}}
@media(max-width:700px){.sb{width:196px}.mn{padding:16px 12px}}
@media(max-width:560px){.layout{flex-direction:column}.sb{width:100%;height:auto;position:static}}
</style>
</head>
<body>
<div id="ls">
  <div class="lb">
    <div style="font-size:2.8rem;margin-bottom:10px">🗣️</div>
    <h2>AAC 대화상대자<br>훈련 프로그램</h2>
    <p>중도·중복장애 학생 지원 교사 대상<br>프로그램 참여자 전용 워크시트</p>
    <input type="password" id="pw" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')login()">
    <button class="lbtn" onclick="login()">입장하기</button>
    <p class="lerr" id="lerr">비밀번호가 올바르지 않습니다.</p>
  </div>
</div>
<div id="app">
<div class="layout">
<nav class="sb">
  <div class="sbh"><h1>AAC 대화상대자<br>훈련 프로그램</h1><p>소통하자! 워크시트</p></div>
  <div class="sbs">
    <div class="sbt">회기별 워크시트</div>
    <div class="ni on" onclick="go('s1')" id="n-s1"><span class="n">1</span>의사소통 사전</div>
    <div class="ni" onclick="go('s2')" id="n-s2"><span class="n">2</span>CPP 자기성찰</div>
    <div class="ni" onclick="go('s3')" id="n-s3"><span class="n">3</span>PAA 상징수준</div>
    <div class="ni" onclick="go('s4')" id="n-s4"><span class="n">4</span>AAC 선택 체크</div>
    <div class="ni" onclick="go('s6')" id="n-s6"><span class="n">6</span>의사소통판 설계</div>
    <div class="ni" onclick="go('s7')" id="n-s7"><span class="n">7</span>소통하자! 스크립트</div>
    <div class="ni" onclick="go('s8')" id="n-s8"><span class="n">8</span>또래 대화상대자</div>
    <div class="ni" onclick="go('s9')" id="n-s9"><span class="n">9</span>AAC 모델링 기록</div>
  </div>
  <div class="sbs">
    <div class="sbt">어휘목록 작성기</div>
    <div class="ni" onclick="go('vocab')" id="n-vocab"><span class="n">📚</span>어휘목록 작성기</div>
  </div>
  <div class="sbf"><button class="lob" onclick="logout()">🔒 로그아웃</button></div>
</nav>
<main class="mn" id="main-content">
<!-- 페이지 내용은 JS로 삽입 -->
</main>
</div>
</div>

<script>
// ─── 데이터 ───
const CPP_ITEMS = [
  '상대방이 어떻게 반응하든, 반응이 없더라도 AAC 사용자에게 자연스럽게 직접 말을 건넨다',
  'AAC 사용자의 자율성을 존중하며, 기기를 만지거나 신체적으로 도움을 주거나 너무 가까이 다가가기 전에 먼저 허락을 구한다',
  '원하는 기기나 방식이 아니더라도(몸짓, 소리 등) 학생의 모든 의사소통 시도에 반응한다',
  '"반응 없음"이나 거부 표현도 AAC 사용자가 자신을 나타내는 방식 중 하나임을 인정한다',
  '학생이 말을 끝냈다는 신호를 줄 때까지 끊지 않고 충분히 기다렸다가 반응한다',
  'AAC 사용자를 개인적으로 잘 알기 위해 시간을 투자하고, 그에 맞게 상호작용 방식을 조율한다',
  '식사 메뉴, 활동 선택, 일과 등 일상적인 결정에 AAC 사용자가 의미 있게 참여할 수 있도록 한다',
  '기기 배치, 의료적 결정, 학습 주제 선정 등 장기적인 결정에도 AAC 사용자가 참여할 수 있도록 한다',
  '어휘 배치를 충분히 익혀서 AAC 사용자에게 의사소통 체계 안에서 다양한 선택지를 고르는 방법을 실제로 보여줄 수 있다',
  '학생이 이미 사용할 수 있는 수준을 넘어서는 단어나 표현을 직접 시범 보이거나 모델링한다 (가능하면 별도 기기 활용)',
  '의사소통을 이끌어내기 위해 활동이나 물건을 일부러 보류하기보다, 자연스러운 상황에서 의사소통 기회를 찾는다',
];

// ─── 어휘 저장소 ───
let ecoW=[], subjW=[], jitW=[];

// ─── 로그인 ───
function login(){
  if(document.getElementById('pw').value==='251SEG02'){
    document.getElementById('ls').style.display='none';
    document.getElementById('app').style.display='block';
    renderAll();
  } else {
    document.getElementById('lerr').style.display='block';
  }
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('pw').value='';
  document.getElementById('lerr').style.display='none';
}

// ─── 페이지 렌더링 ───
function renderAll(){
  const mc = document.getElementById('main-content');
  mc.innerHTML = getS1()+getS2()+getS3()+getS4()+getS6()+getS7()+getS8()+getS9()+getVocab();
  initCPP();
}

// ─── 페이지 전환 ───
function go(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  const pg = document.getElementById('p-'+id);
  const ni = document.getElementById('n-'+id);
  if(pg) pg.classList.add('on');
  if(ni) ni.classList.add('on');
  if(id==='vocab') refreshSummary();
}

// ─── 행 삭제 ───
function dr(btn){ btn.closest('tr').remove(); }

// ─── 의사소통 사전 행 추가 ───
function photoCell(){
  return `<td style="text-align:center;width:80px">
    <div style="position:relative;width:68px;margin:0 auto">
      <img src="" alt="" style="width:68px;height:68px;object-fit:cover;border-radius:7px;border:2px dashed var(--bd);display:none;cursor:pointer" onclick="this.nextElementSibling.click()">
      <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:68px;height:68px;border:2px dashed var(--bd);border-radius:7px;cursor:pointer;font-size:.68rem;color:var(--tm);background:#FAFCFF;transition:all .15s" onmouseover="this.style.borderColor='var(--p)';this.style.color='var(--p)'" onmouseout="this.style.borderColor='var(--bd)';this.style.color='var(--tm)'">
        <span style="font-size:1.4rem">📷</span>
        <span>사진 추가</span>
        <input type="file" accept="image/*" style="display:none" onchange="previewPhoto(this)">
      </label>
    </div>
  </td>`;
}

function previewPhoto(input){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const label=input.parentElement;
    const img=label.previousElementSibling;
    img.src=e.target.result;
    img.style.display='block';
    label.style.display='none';
  };
  reader.readAsDataURL(input.files[0]);
}

function addCD(){
  const tb=document.getElementById('cd-body');
  const tr=document.createElement('tr');
  tr.innerHTML=photoCell()+'<td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td style="text-align:center"><button class="btn br bs" onclick="dr(this)">✕</button></td>';
  tb.appendChild(tr);
}

// ─── CPP 초기화 ───
const CPP_GROUPS = [
  {name:'존중·자율성', color:'#1B4F8A', items:[0,1]},
  {name:'반응하기', color:'#2A7A4B', items:[2,3,4]},
  {name:'관계·참여', color:'#6B3FA0', items:[5,6,7]},
  {name:'모델링 역량', color:'#D4691E', items:[8,9,10]},
];

function initCPP(){
  const tb=document.getElementById('cpp-body');
  if(!tb) return;
  tb.innerHTML='';
  CPP_ITEMS.forEach((item,i)=>{
    const group = CPP_GROUPS.find(g=>g.items.includes(i));
    const tr=document.createElement('tr');
    tr.id=`cpp-row-${i}`;
    tr.innerHTML=`<td style="text-align:left;padding:8px 13px;font-size:.82rem">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${group.color};margin-right:6px;flex-shrink:0;vertical-align:middle"></span>${item}
      <span id="cpp-flag-${i}" style="display:none;margin-left:7px;font-size:.72rem;font-weight:700;color:#C0392B;background:#FEE;padding:2px 7px;border-radius:10px">개선 필요</span>
    </td>${[1,2,3,4].map(v=>`<td style="text-align:center"><input type="radio" name="cpp${i}" value="${v}" onchange="updateCPPFeedback()"></td>`).join('')}`;
    tb.appendChild(tr);
  });
}

function updateCPPFeedback(){
  // 미흡 항목 하이라이트
  CPP_ITEMS.forEach((_,i)=>{
    const checked = document.querySelector(`input[name="cpp${i}"]:checked`);
    const flag = document.getElementById(`cpp-flag-${i}`);
    const row = document.getElementById(`cpp-row-${i}`);
    if(!flag||!row) return;
    if(checked && (checked.value==='1'||checked.value==='2')){
      flag.style.display='inline-block';
      row.style.background='#FFF8F0';
    } else {
      flag.style.display='none';
      row.style.background='';
    }
  });

  // 영역별 그래프 업데이트
  CPP_GROUPS.forEach((g,gi)=>{
    let total=0, count=0;
    g.items.forEach(i=>{
      const checked=document.querySelector(`input[name="cpp${i}"]:checked`);
      if(checked){ total+=parseInt(checked.value); count++; }
    });
    const pct = count===g.items.length ? Math.round(((total/(g.items.length*4))*100)) : null;
    const bar = document.getElementById(`cpp-bar-${gi}`);
    const pctEl = document.getElementById(`cpp-pct-${gi}`);
    if(!bar||!pctEl) return;
    if(pct!==null){
      bar.style.width=pct+'%';
      bar.style.background=g.color;
      pctEl.textContent=pct+'%';
    } else {
      bar.style.width='0%';
      pctEl.textContent='-';
    }
  });

  // 전체 미체크 수
  let unchecked=0;
  CPP_ITEMS.forEach((_,i)=>{ if(!document.querySelector(`input[name="cpp${i}"]:checked`)) unchecked++; });
  const hint=document.getElementById('cpp-hint');
  if(hint) hint.textContent = unchecked>0 ? `※ 아직 ${unchecked}개 항목이 체크되지 않았습니다.` : '✅ 모든 항목 체크 완료!';

  // 개선 필요 항목 목록
  const wl=document.getElementById('cpp-weak-list');
  const wm=document.getElementById('cpp-weak-msg');
  if(!wl||!wm) return;
  const weakItems=[];
  CPP_ITEMS.forEach((item,i)=>{
    const checked=document.querySelector(`input[name="cpp${i}"]:checked`);
    if(checked&&(checked.value==='1'||checked.value==='2')) weakItems.push(item);
  });
  if(weakItems.length>0){
    wm.style.display='none';
    wl.style.display='block';
    wl.innerHTML=weakItems.map(t=>`<li style="margin-bottom:4px">${t}</li>`).join('');
  } else if(unchecked===0){
    wm.style.display='block';
    wm.style.color='#2A7A4B';
    wm.textContent='🎉 모든 항목에서 "대체로" 이상으로 실천하고 있습니다!';
    wl.style.display='none';
  } else {
    wm.style.display='block';
    wm.style.color='var(--tm)';
    wm.textContent='체크리스트를 모두 작성하면 개선이 필요한 항목이 여기 표시됩니다.';
    wl.style.display='none';
  }
}

// ─── 그리드 보기 ───
function sg(n){ ['2','4','8'].forEach(v=>{ const el=document.getElementById('g'+v); if(el) el.style.display=(v===n?'block':'none'); }); }

// ─── 매트릭스 행 추가 ───
let mxN=6;
function addMx(){
  mxN++;
  const tb=document.getElementById('mx-body');
  const tr=document.createElement('tr');
  tr.innerHTML=`<td style="text-align:center">${mxN}</td><td><input type="text"></td><td><input type="text" style="width:90px"></td><td><input type="text" style="width:60px"></td><td><input type="text" style="width:60px"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td>`;

    tb.appendChild(tr);
  });
}
function cst(i,el){const s=['☆☆☆','★☆☆','★★☆','★★★'];const c=s.indexOf(el.textContent);const n=(c+1)%s.length;el.textContent=s[n];el.style.color=n===0?'#ddd':'#F5A623';}

// ─── 탭 전환 ───
function vtab(e,id){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
